version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/vue"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      patch:
        update-types:
          - "patch"
  - package-ecosystem: "uv"
    directory: "/django"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      patch:
        update-types:
          - "patch"
  - package-ecosystem: "uv"
    directory: "/bff"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      patch:
        update-types:
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
