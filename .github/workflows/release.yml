name: Release
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate-version:
    name: Validate monorepo version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Normalize release tag for SemVer validation
        id: normalize-tag
        run: |
          raw_tag="${{ github.event.release.tag_name }}"
          if [[ "$raw_tag" =~ ^[vV](.+)$ ]]; then
            semver_tag="${BASH_REMATCH[1]}"
          else
            semver_tag="$raw_tag"
          fi
          echo "semver_tag=$semver_tag" >> "$GITHUB_OUTPUT"

      - name: Validate shared version against release tag
        run: python3 scripts/wefa_version.py check --expect "${{ steps.normalize-tag.outputs.semver_tag }}"

  publish-bff-image:
    name: Build, tag and publish BFF image
    if: ${{ !github.event.release.draft }}
    runs-on: ubuntu-latest
    needs: validate-version
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/bff
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./bff
          file: ./bff/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-npm:
    name: Publish Vue package to npm
    runs-on: ubuntu-latest
    needs: validate-version
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: vue
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js (with cache)
        uses: ./.github/actions/setup-node
        with:
          node-version: '24'
          cache-dependency-path: 'vue/package-lock.json'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --if-present

      - name: Verify packaged type declarations
        run: node ./scripts/verify-package-types.mjs

      - name: Publish to npm with trusted publishing
        run: npm publish --access public

  publish-pypi:
    name: Publish Django package to PyPI
    runs-on: ubuntu-latest
    needs: validate-version
    environment:
      name: pypi
      url: https://pypi.org/p/nside-wefa
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: django
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python and create venv (uv)
        uses: ./.github/actions/setup-python
        with:
          python-version: '3.12'
          install-dev: 'false'
          project-dir: 'django'
          cache-dependency-path: 'django/pyproject.toml'

      - name: Install build tooling
        run: uv pip install --python "$VIRTUAL_ENV" build

      - name: Build distributions
        run: uv run python -m build --installer uv

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: django/dist
          skip-existing: true
