# PySentry configuration for the BFF package.
version = 1

[defaults]
fail_on = "medium"

[ignore]
# flask-cors debug-mode log injection (CRLF in request path).
# Latest published flask-cors (6.0.2) is still affected; no upstream fix.
# Only exploitable when log level is DEBUG.
while_no_fix = ["GHSA-5239-wwwm-4pmq", "PYSEC-2024-271"]
